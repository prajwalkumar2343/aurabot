<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AuraBot Browser Context</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main>
    <h1>AuraBot Browser Context</h1>

    <label>
      <input id="captureEnabled" type="checkbox">
      Enable browser context capture
    </label>

    <label>
      Local server URL
      <input id="serverURL" type="url" placeholder="http://127.0.0.1:7345">
    </label>

    <label>
      Extension API key
      <input id="apiKey" type="password" autocomplete="off">
    </label>

    <label>
      <input id="captureFullPageText" type="checkbox">
      Capture full readable page text
    </label>

    <label>
      Disabled domains
      <textarea id="disabledDomains" rows="5" placeholder="example.com&#10;internal.company.com"></textarea>
    </label>

    <button id="save" type="button">Save</button>
    <p id="status" role="status"></p>
  </main>
  <script src="settings.js"></script>
  <script src="options.js"></script>
</body>
</html>
