name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-memory-api:
    name: Python Memory API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover services/memory-api/tests

      - name: Compile Python sources
        run: python -m compileall -q services/memory-api/src tools start.py

  macos-app:
    name: macOS App Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build AuraBot
        run: swift build
        working-directory: apps/macos

  swift-mem0:
    name: Swift Mem0 Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Mem0
        run: swift build
        working-directory: swift-mem0
