name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  repository-contracts:
    name: Repository Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository contract tests
        run: python -m unittest discover tests

  python-memory-api:
    name: Python Memory API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover services/memory-api/tests

      - name: Run computer-use skill contract tests
        run: python -m unittest discover apps/macos/Tests/ComputerUseSkillTests

      - name: Compile Python sources
        run: python -m compileall -q services/memory-api/src tools start.py

  macos-app:
    name: macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build AuraBot
        run: swift build
        working-directory: apps/macos

      - name: Run AuraBot tests
        run: swift test
        working-directory: apps/macos
